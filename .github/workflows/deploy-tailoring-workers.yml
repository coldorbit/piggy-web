name: Deploy Tailoring Workers

on:
  workflow_dispatch:
    inputs:
      hosts_json:
        description: 'JSON array of worker EC2 hosts. Leave blank to use WORKER_EC2_HOSTS.'
        required: false
        default: ''
  push:
    branches:
      - main
    paths:
      - worker/**
      - .github/workflows/deploy-tailoring-workers.yml

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ${{ vars.WORKER_GHCR_IMAGE_NAME || 'applypilot-tailoring-worker' }}
  CONTAINER_NAME: ${{ vars.WORKER_CONTAINER_NAME || 'applypilot-tailoring-worker' }}
  ENV_FILE: ${{ vars.WORKER_ENV_FILE || '/home/ubuntu/worker.env' }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
      hosts_json: ${{ steps.hosts.outputs.hosts_json }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve worker hosts
        id: hosts
        env:
          INPUT_HOSTS_JSON: ${{ inputs.hosts_json }}
          VAR_HOSTS_JSON: ${{ vars.WORKER_EC2_HOSTS }}
        run: |
          hosts_json="${INPUT_HOSTS_JSON:-$VAR_HOSTS_JSON}"
          if [ -z "$hosts_json" ]; then
            echo 'Set WORKER_EC2_HOSTS to a JSON array, for example ["10.0.1.10","10.0.1.11"].' >&2
            exit 1
          fi
          echo "$hosts_json" | jq -e 'type == "array" and length > 0 and all(.[]; type == "string" and length > 0)' >/dev/null
          echo "hosts_json=$hosts_json" >> "$GITHUB_OUTPUT"

      - name: Set image ref
        id: image
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "image=ghcr.io/${owner}/${IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest=ghcr.io/${owner}/${IMAGE_NAME}:latest" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          push: true
          tags: |
            ${{ steps.image.outputs.image }}
            ${{ steps.image.outputs.latest }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        host: ${{ fromJSON(needs.build.outputs.hosts_json) }}
    steps:
      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.WORKER_EC2_SSH_KEY || secrets.EC2_SSH_KEY }}

      - name: Deploy worker container
        env:
          EC2_USER: ${{ vars.WORKER_EC2_USER || vars.EC2_USER || 'ubuntu' }}
          IMAGE: ${{ needs.build.outputs.image }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
          HOST: ${{ matrix.host }}
        run: |
          ssh -o StrictHostKeyChecking=accept-new "$EC2_USER@$HOST" \
            "GHCR_USER='$GHCR_USER' GHCR_TOKEN='$GHCR_TOKEN' IMAGE='$IMAGE' CONTAINER_NAME='$CONTAINER_NAME' ENV_FILE='$ENV_FILE' bash -s" <<'REMOTE'
          set -euo pipefail

          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
          docker pull "$IMAGE"
          docker stop "$CONTAINER_NAME" || true
          docker rm "$CONTAINER_NAME" || true
          docker run -d \
            --name "$CONTAINER_NAME" \
            --restart unless-stopped \
            --env-file "$ENV_FILE" \
            "$IMAGE"
          docker image prune -f
          REMOTE
