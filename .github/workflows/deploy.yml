name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || secrets.AWS_REGION }}
  API_ECR_REPOSITORY: ${{ vars.API_ECR_REPOSITORY || 'applypilot-api' }}
  API_CONTAINER_NAME: ${{ vars.API_CONTAINER_NAME || 'applypilot-api' }}
  API_HOST_PORT: ${{ vars.API_HOST_PORT || '4000' }}
  NODE_VERSION: '24'
  PNPM_VERSION: '9.15.9'

jobs:
  deploy-api:
    name: Deploy API to EC2
    runs-on: ubuntu-latest
    environment: production
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set image metadata
        id: image
        shell: bash
        run: |
          set -euo pipefail
          account_id="$(aws sts get-caller-identity --query Account --output text)"
          registry="${account_id}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          image="${registry}/${API_ECR_REPOSITORY}:${GITHUB_SHA}"
          echo "registry=${registry}" >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"

      - name: Ensure ECR repository exists
        shell: bash
        run: |
          set -euo pipefail
          aws ecr describe-repositories --repository-names "$API_ECR_REPOSITORY" >/dev/null 2>&1 || \
            aws ecr create-repository \
              --repository-name "$API_ECR_REPOSITORY" \
              --image-scanning-configuration scanOnPush=true \
              --encryption-configuration encryptionType=AES256 >/dev/null

      - name: Login to ECR
        shell: bash
        run: |
          set -euo pipefail
          aws ecr get-login-password --region "$AWS_REGION" | \
            docker login --username AWS --password-stdin "${{ steps.image.outputs.registry }}"

      - name: Build and push API image
        shell: bash
        run: |
          set -euo pipefail
          docker build \
            --file api/Dockerfile \
            --tag "${{ steps.image.outputs.image }}" \
            --tag "${{ steps.image.outputs.registry }}/${API_ECR_REPOSITORY}:latest" \
            api
          docker push "${{ steps.image.outputs.image }}"
          docker push "${{ steps.image.outputs.registry }}/${API_ECR_REPOSITORY}:latest"

      - name: Write API environment file
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          cat > api.env <<'EOF'
          NODE_ENV=production
          WEB_PORT=4000
          CLIENT_ORIGIN=${{ secrets.CLIENT_ORIGIN }}
          CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          DATABASE_SSL=${{ secrets.DATABASE_SSL || 'false' }}
          WEB_SESSION_SECRET=${{ secrets.WEB_SESSION_SECRET }}
          WEB_USERS=${{ secrets.WEB_USERS }}
          WEB_USERNAME=${{ secrets.WEB_USERNAME }}
          WEB_PASSWORD=${{ secrets.WEB_PASSWORD }}
          TAILOR_SERVICE_URL=${{ secrets.TAILOR_SERVICE_URL }}
          AWS_REGION=${{ env.AWS_REGION }}
          AWS_SQS_ENDPOINT=${{ secrets.AWS_SQS_ENDPOINT }}
          TAILORING_QUEUE_URL=${{ secrets.TAILORING_QUEUE_URL }}
          EOF
          sed -i 's/^[[:space:]]*//' api.env

      - name: Install SSH key
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload API environment to EC2
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/ec2_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" 'mkdir -p /opt/applypilot'
          scp -i ~/.ssh/ec2_key api.env "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/applypilot/api.env"
          ssh -i ~/.ssh/ec2_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" 'chmod 600 /opt/applypilot/api.env'

      - name: Restart API container on EC2
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/ec2_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "AWS_REGION='${AWS_REGION}' \
             ECR_REGISTRY='${{ steps.image.outputs.registry }}' \
             API_IMAGE='${{ steps.image.outputs.image }}' \
             API_CONTAINER_NAME='${API_CONTAINER_NAME}' \
             API_HOST_PORT='${API_HOST_PORT}' \
             bash -s" <<'REMOTE'
          set -euo pipefail
          aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$ECR_REGISTRY"
          docker pull "$API_IMAGE"
          docker rm -f "$API_CONTAINER_NAME" 2>/dev/null || true
          docker run -d \
            --name "$API_CONTAINER_NAME" \
            --restart unless-stopped \
            --env-file /opt/applypilot/api.env \
            -p "${API_HOST_PORT}:4000" \
            "$API_IMAGE"
          docker image prune -f
          REMOTE

  deploy-client:
    name: Deploy Client to S3 and CloudFront
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
    needs:
      - deploy-api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build client
        run: pnpm --filter applypilot-client build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload immutable assets
        shell: bash
        run: |
          set -euo pipefail
          aws s3 sync client/dist "s3://${{ secrets.CLIENT_S3_BUCKET }}" \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload HTML entrypoint
        shell: bash
        run: |
          set -euo pipefail
          aws s3 cp client/dist/index.html "s3://${{ secrets.CLIENT_S3_BUCKET }}/index.html" \
            --content-type "text/html; charset=utf-8" \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront
        if: ${{ env.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        shell: bash
        run: |
          set -euo pipefail
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/*"
