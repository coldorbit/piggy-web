name: Deploy API

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - api/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .github/workflows/deploy-api.yml

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ${{ vars.API_GHCR_IMAGE_NAME || 'applypilot-api' }}
  CONTAINER_NAME: ${{ vars.API_CONTAINER_NAME || 'applypilot-api' }}
  HOST_PORT: ${{ vars.API_HOST_PORT || '4000' }}
  ENV_FILE: ${{ vars.API_ENV_FILE || '/home/ubuntu/.env' }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image ref
        id: image
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "image=ghcr.io/${owner}/${IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest=ghcr.io/${owner}/${IMAGE_NAME}:latest" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: |
            ${{ steps.image.outputs.image }}
            ${{ steps.image.outputs.latest }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Deploy API container
        env:
          EC2_HOST: ${{ vars.EC2_HOST }}
          EC2_USER: ${{ vars.EC2_USER || 'ubuntu' }}
          IMAGE: ${{ needs.build.outputs.image }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$EC2_HOST" ]; then
            echo "EC2_HOST repository variable is required." >&2
            exit 1
          fi

          ssh -o StrictHostKeyChecking=accept-new "$EC2_USER@$EC2_HOST" \
            "GHCR_USER='$GHCR_USER' GHCR_TOKEN='$GHCR_TOKEN' IMAGE='$IMAGE' CONTAINER_NAME='$CONTAINER_NAME' HOST_PORT='$HOST_PORT' ENV_FILE='$ENV_FILE' bash -s" <<'REMOTE'
          set -euo pipefail

          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
          docker pull "$IMAGE"
          docker stop "$CONTAINER_NAME" || true
          docker rm "$CONTAINER_NAME" || true
          docker run -d \
            --name "$CONTAINER_NAME" \
            --restart unless-stopped \
            --env-file "$ENV_FILE" \
            -p "0.0.0.0:${HOST_PORT}:4000" \
            "$IMAGE"
          docker image prune -f
          REMOTE
