services:
  api:
    build:
      context: ./api
    environment:
      NODE_ENV: production
      WEB_PORT: 4000
      CLIENT_ORIGIN: http://localhost:${CLIENT_PORT:-3000}
      CORS_ORIGINS: http://localhost:${CLIENT_PORT:-3000}
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_SSL: ${DATABASE_SSL:-false}
      WEB_SESSION_SECRET: ${WEB_SESSION_SECRET:-dev-only-change-me}
      WEB_USERS: ${WEB_USERS:-}
      WEB_USERNAME: ${WEB_USERNAME}
      WEB_PASSWORD: ${WEB_PASSWORD}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_SQS_ENDPOINT: ${AWS_SQS_ENDPOINT:-}
      TAILORING_QUEUE_URL: ${TAILORING_QUEUE_URL:-}
      MAILBOX_EMAIL: ${MAILBOX_EMAIL:-service@co-bounce.com}
      MAILBOX_PASSWORD: ${MAILBOX_PASSWORD:-}
      MAILBOX_IMAP_HOST: ${MAILBOX_IMAP_HOST:-mail.privateemail.com}
      MAILBOX_IMAP_PORT: ${MAILBOX_IMAP_PORT:-993}
      MAILBOX_IMAP_SECURE: ${MAILBOX_IMAP_SECURE:-true}
    ports:
      - 0.0.0.0:${API_PORT:-4000}:4000
    init: true

  worker:
    build:
      context: ./worker
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_SSL: ${DATABASE_SSL:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-300}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5-mini}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_SQS_ENDPOINT: ${AWS_SQS_ENDPOINT:-}
      TAILORING_QUEUE_URL: ${TAILORING_QUEUE_URL:-}
      TAILORING_CONCURRENCY: ${TAILORING_CONCURRENCY:-4}
      TAILORING_MAX_ATTEMPTS: ${TAILORING_MAX_ATTEMPTS:-3}
      TAILORING_VISIBILITY_TIMEOUT_SECONDS: ${TAILORING_VISIBILITY_TIMEOUT_SECONDS:-600}
    depends_on:
      - api
    init: true

  client:
    build:
      context: ./client
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:${API_PORT:-4000}}
    ports:
      - 0.0.0.0:${CLIENT_PORT:-3000}:80
    depends_on:
      - api
    init: true
